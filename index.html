<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0f">
<title>Enchante Hair — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b0f;
  --surface: #14141c;
  --surface2: #1c1c28;
  --border: #252535;
  --border2: #2e2e42;
  --gold: #c9a96e;
  --gold-dim: rgba(201,169,110,.10);
  --gold-light: #e8d5a8;
  --text: #e4e4ec;
  --text-dim: #9494b8;
  --text-muted: #5c5c78;
  --green: #4ade80;
  --red: #f87171;
  --radius: 16px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(201,169,110,.07), transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(201,169,110,.04), transparent 50%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  padding: var(--safe-top) 0 var(--safe-bottom);
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 3.2rem 1.2rem 1.6rem;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 48px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.85rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: .22em;
  margin-bottom: .35rem;
}
.subtitle {
  font-family: 'Outfit', sans-serif;
  font-size: .72rem;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: .32em;
  text-transform: uppercase;
}

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 2rem 1rem 1.2rem;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  align-content: start;
}

.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem 1rem 1.3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform .22s ease, border-color .3s ease, box-shadow .3s ease;
  overflow: hidden;
  min-height: 160px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity .3s ease;
}
.card:active, .card:hover {
  transform: translateY(-2px);
  border-color: var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,.3), 0 0 0 1px rgba(201,169,110,.06);
}
.card:active::before, .card:hover::before { opacity: 1; }

.card-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: .9rem;
  flex-shrink: 0;
}

.card--reserve .card-icon { background: rgba(102,178,102,.10); color: #66b266; }
.card--karte .card-icon   { background: rgba(167,139,250,.10); color: #a78bfa; }
.card--ig .card-icon      { background: rgba(201,169,110,.10); color: var(--gold); }
.card--form .card-icon    { background: rgba(96,165,250,.10);  color: #60a5fa; }

.card-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: .88rem;
  letter-spacing: .02em;
  margin-bottom: .3rem;
  color: var(--text);
}
.card-desc {
  font-size: .68rem;
  color: var(--text-dim);
  line-height: 1.55;
}

.actions {
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  padding: 0 1rem 2rem;
}
.actions-label {
  font-family: 'Outfit', sans-serif;
  font-size: .65rem;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: .7rem;
}
.action-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: .75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .85rem 1rem;
  color: var(--text);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .3s ease, background .3s ease;
}
.action-btn:active, .action-btn:hover {
  border-color: var(--border2);
  background: var(--surface2);
}
.action-btn[disabled] {
  pointer-events: none;
  opacity: .55;
}
.action-btn-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--gold-dim);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.action-btn-text {
  flex: 1;
  text-align: left;
}
.action-btn-text small {
  display: block;
  font-size: .65rem;
  font-weight: 400;
  color: var(--text-dim);
  margin-top: .15rem;
}
.action-btn-status {
  font-size: .72rem;
  font-weight: 600;
  white-space: nowrap;
  min-width: 44px;
  text-align: right;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner-sm {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}

.footer {
  margin-top: auto;
  text-align: center;
  padding: .8rem 1rem 1.6rem;
  font-size: .62rem;
  color: var(--text-muted);
  letter-spacing: .06em;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card, .action-btn {
  opacity: 0;
  animation: cardIn .5s ease forwards;
}
.card:nth-child(1) { animation-delay: .1s; }
.card:nth-child(2) { animation-delay: .18s; }
.card:nth-child(3) { animation-delay: .26s; }
.card:nth-child(4) { animation-delay: .34s; }
.action-btn        { animation-delay: .42s; }

@media (max-width: 340px) {
  .cards { gap: 10px; padding: 1.6rem .8rem .8rem; }
  .card { padding: 1.2rem .8rem 1rem; min-height: 140px; }
  .brand { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="brand">Enchanté</div>
  <div class="subtitle">Management Portal</div>
</header>

<main class="cards">

  <a class="card card--reserve" href="https://newtype3104-byte.github.io/reservekit/" target="_blank" rel="noopener">
    <div class="card-icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
      </svg>
    </div>
    <div class="card-name">ReserveKit</div>
    <div class="card-desc">予約管理ダッシュボード</div>
  </a>

  <a class="card card--karte" href="https://script.google.com/macros/s/AKfycbwhhsOX7nnBnRb1zhjxnOpQcTKTEAg4lVoTzV-A60fq1cuwx7xXiR-2YtZbSGCBi8dSNw/exec?view=karte" target="_blank" rel="noopener">
    <div class="card-icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
    </div>
    <div class="card-name">カルテ</div>
    <div class="card-desc">顧客カルテ閲覧・AI解析</div>
  </a>

  <a class="card card--ig" href="https://script.google.com/macros/s/AKfycbyVKsYspDGNK4C1Cby4-IsGTMlNvf0LKVMy9QfAe9LJ0vgrEiQQRQuHNGRA0raTC0DKpA/exec" target="_blank" rel="noopener">
    <div class="card-icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="card-name">IG管理</div>
    <div class="card-desc">Instagram下書き・投稿管理</div>
  </a>

  <a class="card card--form" href="https://docs.google.com/forms/d/e/1FAIpQLSeW2a_28eoiWoCfKz1Cw-T3NWzVGWi5Vw4hcDP5P6aN1kVhWg/viewform" target="_blank" rel="noopener">
    <div class="card-icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>
    <div class="card-name">カルテ送信</div>
    <div class="card-desc">写真・カルテ入力フォーム</div>
  </a>

</main>

<section class="actions">
  <div class="actions-label">Quick Actions</div>
  <button class="action-btn" id="updateBtn" onclick="updateCustomerList()">
    <div class="action-btn-icon">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
    </div>
    <div class="action-btn-text">
      顧客リスト更新
      <small>カルテフォームのお客様名を同期</small>
    </div>
    <span class="action-btn-status" id="updateStatus"></span>
  </button>
</section>

<footer class="footer">Enchanté Hair — Kameoka, Kyoto</footer>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyVKsYspDGNK4C1Cby4-IsGTMlNvf0LKVMy9QfAe9LJ0vgrEiQQRQuHNGRA0raTC0DKpA/exec';

function updateCustomerList() {
  var btn = document.getElementById('updateBtn');
  var status = document.getElementById('updateStatus');

  btn.disabled = true;
  status.innerHTML = '<div class="spinner-sm"></div>';
  status.style.color = '';

  var old = document.getElementById('gasFrame');
  if (old) old.remove();

  var iframe = document.createElement('iframe');
  iframe.id = 'gasFrame';
  iframe.style.display = 'none';
  iframe.src = GAS_URL + '?action=updateCustomerList&t=' + Date.now();
  document.body.appendChild(iframe);

  setTimeout(function() {
    status.textContent = '\u2713 送信済み';
    status.style.color = '#4ade80';
    btn.disabled = false;
    setTimeout(function() {
      status.textContent = '';
      status.style.color = '';
    }, 4000);
  }, 5000);
}
</script>

</body>
</html>
